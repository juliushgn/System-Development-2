# Application
spring.application.name=Enterprise Service Request Management

# H2 File-based persistence (data survives restarts)
spring.datasource.url=jdbc:h2:file:./data/srm-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (for development/demo)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false

# Server
server.port=${PORT:8080}

# Show full error details (remove for production)
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-binding-errors=always
