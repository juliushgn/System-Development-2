<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alle Anfragen · SRM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="srm-layout">

    <!-- ── Sidebar ──────────────────────────────────────────────── -->
    <aside th:replace="~{fragments/sidebar :: sidebar('allRequests')}"></aside>

    <!-- ── Main ─────────────────────────────────────────────────── -->
    <div class="srm-main">
        <div class="srm-topbar">
            <button class="srm-menu-btn" id="sidebarToggle" aria-label="Menü öffnen">
                <i class="bi bi-list"></i>
            </button>
            <span class="srm-topbar-title" data-i18n="mgrReq.title">Alle Anfragen</span>
        </div>

        <div class="srm-content">
            <div class="page-header d-flex align-center justify-between">
                <div>
                    <h1 class="page-title" data-i18n="mgrReq.title">Alle Anfragen</h1>
                    <p class="page-subtitle" data-i18n="mgrReq.subtitle">Vollständige Übersicht aller Serviceanfragen</p>
                </div>
                <span class="chip" id="visibleCount" th:text="${#lists.size(requests)} + ' gesamt'"></span>
            </div>

            <div class="card">
                <div class="card-header">
                    <i class="bi bi-table" style="color:var(--blue);"></i>
                    <span class="card-header-title" data-i18n="nav.allRequests">Alle Anfragen</span>
                </div>

                <!-- Search + filters -->
                <div style="padding:12px 20px 4px; display:flex; flex-direction:column; gap:10px;">

                    <!-- Text search -->
                    <div class="input-group" style="max-width:400px;">
                        <input type="text" id="reqSearch" class="form-control"
                               data-i18n-ph="mgrReq.searchPh"
                               placeholder="Anfragen durchsuchen…">
                        <button type="button" class="btn"
                                onclick="document.getElementById('reqSearch').value=''; applyFilters();">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>

                    <!-- Status filter -->
                    <div style="display:flex; flex-wrap:wrap; gap:6px; align-items:center;">
                        <span style="font-size:12px; color:var(--text-muted); margin-right:2px;"
                              data-i18n="dash.filterStatus">Status:</span>
                        <button class="srm-filter-btn active" data-filter-type="status" data-filter-value="ALL"
                                data-i18n="dash.filterAll">Alle</button>
                        <button class="srm-filter-btn" data-filter-type="status" data-filter-value="NEW">New</button>
                        <button class="srm-filter-btn" data-filter-type="status" data-filter-value="ASSIGNED">Assigned</button>
                        <button class="srm-filter-btn" data-filter-type="status" data-filter-value="IN_PROGRESS">In Progress</button>
                        <button class="srm-filter-btn" data-filter-type="status" data-filter-value="WAITING_FOR_INFO">Waiting</button>
                        <button class="srm-filter-btn" data-filter-type="status" data-filter-value="RESOLVED">Resolved</button>
                        <button class="srm-filter-btn" data-filter-type="status" data-filter-value="CLOSED">Closed</button>
                    </div>

                    <!-- Category filter -->
                    <div style="display:flex; flex-wrap:wrap; gap:6px; align-items:center; padding-bottom:8px;">
                        <span style="font-size:12px; color:var(--text-muted); margin-right:2px;"
                              data-i18n="dash.filterCat">Kategorie:</span>
                        <button class="srm-filter-btn active" data-filter-type="category" data-filter-value="ALL"
                                data-i18n="dash.filterAll">Alle</button>
                        <button class="srm-filter-btn" data-filter-type="category" data-filter-value="IT_SUPPORT">IT Support</button>
                        <button class="srm-filter-btn" data-filter-type="category" data-filter-value="FACILITY">Facility</button>
                        <button class="srm-filter-btn" data-filter-type="category" data-filter-value="HR_DOCUMENT">HR Document</button>
                        <button class="srm-filter-btn" data-filter-type="category" data-filter-value="OFFICE_SUPPLIES">Office Supplies</button>
                        <button class="srm-filter-btn" data-filter-type="category" data-filter-value="ACCESS_PERMISSION">Access / Permission</button>
                        <button class="srm-filter-btn" data-filter-type="category" data-filter-value="OTHER">Other</button>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(requests)}" class="empty-state">
                    <i class="bi bi-search"></i>
                    <p data-i18n="mgrReq.empty">Keine Anfragen gefunden.</p>
                </div>

                <div th:unless="${#lists.isEmpty(requests)}" class="srm-table-wrap">
                    <table class="srm-table">
                        <thead>
                            <tr>
                                <th data-i18n="th.no">Ticket #</th>
                                <th data-i18n="th.title">Titel</th>
                                <th data-i18n="th.category">Kategorie</th>
                                <th data-i18n="th.priority">Priorität</th>
                                <th data-i18n="th.status">Status</th>
                                <th data-i18n="th.creator">Ersteller</th>
                                <th data-i18n="th.assigned">Zugewiesen</th>
                                <th data-i18n="th.created">Erstellt</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="reqTableBody">
                            <tr th:each="req : ${requests}"
                                th:attr="data-status=${req.status.name()},
                                         data-category=${req.category.name()},
                                         data-search=${req.title + ' ' + req.requestNumber + ' ' + req.submittedBy.fullName}">
                                <td><span class="cell-mono" th:text="${req.requestNumber}"></span></td>
                                <td class="cell-primary" th:text="${req.title}"></td>
                                <td><span class="chip" th:text="${req.category.displayName}"></span></td>
                                <td>
                                    <span th:class="'badge priority-' + ${req.priority.name().toLowerCase()}"
                                          th:text="${req.priority.displayName}"></span>
                                </td>
                                <td>
                                    <span th:class="'badge status-' + ${req.status.name().toLowerCase().replace('_','-')}"
                                          th:text="${req.status.displayName}"></span>
                                </td>
                                <td class="cell-muted" th:text="${req.submittedBy.fullName}"></td>
                                <td class="cell-muted" th:text="${req.assignedTo?.fullName ?: '—'}"></td>
                                <td class="cell-muted" th:text="${#temporals.format(req.createdAt, 'dd.MM.yy')}"></td>
                                <td>
                                    <a th:href="@{/agent/requests/{id}(id=${req.id})}"
                                       class="btn btn-tonal btn-sm">
                                        <span data-i18n="mgrReq.viewBtn">Ansehen</span>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div id="reqEmpty" class="empty-state" style="display:none;">
                        <i class="bi bi-search"></i>
                        <p data-i18n="mgrReq.empty">Keine Anfragen gefunden.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="srm-overlay" id="sidebarOverlay"></div>
<script th:src="@{/js/main.js}"></script>
<script>
(function () {
  var activeStatus   = 'ALL';
  var activeCategory = 'ALL';

  function applyFilters() {
    var query = (document.getElementById('reqSearch').value || '').toLowerCase().trim();
    var rows  = document.querySelectorAll('#reqTableBody tr');
    var visible = 0;

    rows.forEach(function (row) {
      var statusMatch   = activeStatus   === 'ALL' || row.dataset.status   === activeStatus;
      var categoryMatch = activeCategory === 'ALL' || row.dataset.category === activeCategory;
      var searchMatch   = !query || (row.dataset.search || '').toLowerCase().includes(query);
      var show = statusMatch && categoryMatch && searchMatch;
      row.style.display = show ? '' : 'none';
      if (show) visible++;
    });

    var countEl = document.getElementById('visibleCount');
    if (countEl) countEl.textContent = visible + ' gesamt';

    var emptyEl = document.getElementById('reqEmpty');
    if (emptyEl) emptyEl.style.display = visible === 0 ? 'block' : 'none';
  }

  document.querySelectorAll('.srm-filter-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var type  = btn.dataset.filterType;
      var value = btn.dataset.filterValue;
      document.querySelectorAll('.srm-filter-btn[data-filter-type="' + type + '"]')
        .forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      if (type === 'status')   activeStatus   = value;
      if (type === 'category') activeCategory = value;
      applyFilters();
    });
  });

  document.getElementById('reqSearch').addEventListener('input', applyFilters);
  window.applyFilters = applyFilters;
})();
</script>
</body>
</html>
