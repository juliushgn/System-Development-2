<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neue Anfrage · SRM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="srm-layout">

    <!-- ── Sidebar ──────────────────────────────────────────────── -->
    <aside th:replace="~{fragments/sidebar :: sidebar('newRequest')}"></aside>

    <!-- ── Main ─────────────────────────────────────────────────── -->
    <div class="srm-main">
        <div class="srm-topbar">
            <button class="srm-menu-btn" id="sidebarToggle" aria-label="Menü öffnen">
                <i class="bi bi-list"></i>
            </button>
            <span class="srm-topbar-title" data-i18n="empNew.title">Neue Anfrage</span>
        </div>

        <div class="srm-content">
            <!-- Page header -->
            <div class="page-header d-flex align-center gap-3">
                <a th:href="@{/employee/requests}" class="btn btn-secondary btn-icon btn-sm"
                   aria-label="Zurück">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <div>
                    <h1 class="page-title" data-i18n="empNew.title">Neue Anfrage</h1>
                    <p class="page-subtitle" data-i18n="empNew.subtitle">Beschreiben Sie Ihr Anliegen</p>
                </div>
            </div>

            <div style="max-width:640px;">
                <div class="card">
                    <div class="card-body" style="padding:28px;">
                        <form th:action="@{/employee/requests/new}" method="post"
                              th:object="${requestForm}">

                            <div class="form-group">
                                <label for="title" class="form-label">
                                    <span data-i18n="empNew.labelTitle">Titel</span>
                                    <span class="form-required">*</span>
                                </label>
                                <input type="text" id="title" class="form-control"
                                       th:field="*{title}"
                                       th:classappend="${#fields.hasErrors('title')} ? ' is-invalid'"
                                       data-i18n-ph="empNew.titlePh"
                                       placeholder="Kurze, prägnante Beschreibung Ihrer Anfrage"
                                       maxlength="200">
                                <span class="invalid-feedback" th:if="${#fields.hasErrors('title')}"
                                      th:errors="*{title}"></span>
                            </div>

                            <div class="form-group">
                                <label for="description" class="form-label">
                                    <span data-i18n="empNew.labelDesc">Beschreibung</span>
                                    <span class="form-required">*</span>
                                </label>
                                <textarea id="description" class="form-control"
                                          th:field="*{description}"
                                          th:classappend="${#fields.hasErrors('description')} ? ' is-invalid'"
                                          rows="6"
                                          data-i18n-ph="empNew.descPh"
                                          placeholder="Beschreiben Sie Ihr Problem oder Anliegen ausführlich…"
                                          maxlength="2000"></textarea>
                                <span class="invalid-feedback" th:if="${#fields.hasErrors('description')}"
                                      th:errors="*{description}"></span>
                            </div>

                            <div class="grid-2 mb-5">
                                <div class="form-group" style="margin-bottom:0;">
                                    <label for="category" class="form-label">
                                        <span data-i18n="empNew.labelCat">Kategorie</span>
                                        <span class="form-required">*</span>
                                    </label>
                                    <select id="category" class="form-select"
                                            th:field="*{category}"
                                            th:classappend="${#fields.hasErrors('category')} ? ' is-invalid'">
                                        <option value="" data-i18n="empNew.catPh">Kategorie wählen…</option>
                                        <option th:each="cat : ${categories}"
                                                th:value="${cat.name()}"
                                                th:text="${cat.displayName}"></option>
                                    </select>
                                    <span class="invalid-feedback" th:if="${#fields.hasErrors('category')}"
                                          th:errors="*{category}"></span>
                                </div>
                                <div class="form-group" style="margin-bottom:0;">
                                    <label for="priority" class="form-label">
                                        <span data-i18n="empNew.labelPrio">Priorität</span>
                                        <span class="form-required">*</span>
                                    </label>
                                    <select id="priority" class="form-select"
                                            th:field="*{priority}"
                                            th:classappend="${#fields.hasErrors('priority')} ? ' is-invalid'">
                                        <option value="" data-i18n="empNew.prioPh">Priorität wählen…</option>
                                        <option th:each="p : ${priorities}"
                                                th:value="${p.name()}"
                                                th:text="${p.displayName}"></option>
                                    </select>
                                    <span class="invalid-feedback" th:if="${#fields.hasErrors('priority')}"
                                          th:errors="*{priority}"></span>
                                </div>
                            </div>

                            <div class="d-flex gap-3">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-send"></i>
                                    <span data-i18n="empNew.submit">Anfrage absenden</span>
                                </button>
                                <a th:href="@{/employee/requests}" class="btn btn-secondary">
                                    <span data-i18n="empNew.cancel">Abbrechen</span>
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="srm-overlay" id="sidebarOverlay"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
