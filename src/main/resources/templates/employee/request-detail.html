<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${request.requestNumber} + ' · SRM'">Anfrage</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="srm-layout">

    <!-- ── Sidebar ──────────────────────────────────────────────── -->
    <aside class="srm-sidebar" id="sidebar">
        <a class="srm-brand" th:href="@{/}">
            <div class="srm-brand-mark"><i class="bi bi-ticket-detailed"></i></div>
            <span class="srm-brand-name">SRM <em>System</em></span>
        </a>

        <nav class="srm-nav">
            <span class="srm-nav-label" data-i18n="nav.label">Navigation</span>
            <a class="srm-nav-item active" th:href="@{/employee/requests}">
                <i class="bi bi-list-ul"></i>
                <span data-i18n="nav.myRequests">Meine Anfragen</span>
            </a>
            <a class="srm-nav-item" th:href="@{/employee/requests/new}">
                <i class="bi bi-plus-circle"></i>
                <span data-i18n="nav.newRequest">Neue Anfrage</span>
            </a>
        </nav>

        <div class="srm-sidebar-footer">
            <div class="srm-sidebar-prefs">
                <button type="button" class="srm-pref-btn srm-theme-btn" title="Dunkelmodus"><i class="bi bi-moon-stars"></i><span class="pref-label">Dunkelmodus</span></button>
                <button type="button" class="srm-pref-btn srm-lang-btn" title="English"><i class="bi bi-translate"></i><span class="pref-label">English</span></button>
            </div>
            <div class="srm-user-row">
                <div class="srm-avatar"
                     th:text="${#strings.substring(currentUser.firstName,0,1) + #strings.substring(currentUser.lastName,0,1)}">AM</div>
                <div>
                    <div class="srm-user-info-name" th:text="${currentUser.fullName}">Alice Meyer</div>
                    <div class="srm-user-info-role" data-i18n="role.employee">Mitarbeiter</div>
                </div>
            </div>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="srm-logout-btn">
                    <i class="bi bi-box-arrow-right"></i>
                    <span data-i18n="nav.logout">Abmelden</span>
                </button>
            </form>
        </div>
    </aside>

    <!-- ── Main ─────────────────────────────────────────────────── -->
    <div class="srm-main">
        <div class="srm-topbar">
            <button class="srm-menu-btn" id="sidebarToggle" aria-label="Menü öffnen">
                <i class="bi bi-list"></i>
            </button>
            <span class="srm-topbar-title" th:text="${request.requestNumber}">REQ-00001</span>
        </div>

        <div class="srm-content">
            <!-- Page header -->
            <div class="page-header d-flex align-center gap-3 mb-5">
                <a th:href="@{/employee/requests}" class="btn btn-secondary btn-icon btn-sm">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <div class="d-flex align-center gap-3 flex-1">
                    <code style="font-family:'Roboto Mono',monospace;font-size:13px;font-weight:600;
                                 color:var(--blue);background:var(--blue-tonal);
                                 padding:4px 10px;border-radius:var(--r-xs);"
                          th:text="${request.requestNumber}">REQ-00001</code>
                    <span th:class="'badge status-' + ${request.status.name().toLowerCase().replace('_','-')}"
                          th:text="${request.status.displayName}"></span>
                    <span th:class="'badge priority-' + ${request.priority.name().toLowerCase()}"
                          th:text="${request.priority.displayName}"></span>
                </div>
            </div>

            <div class="layout-main">
                <!-- Left column -->
                <div>
                    <!-- Request content -->
                    <div class="card mb-4">
                        <div class="card-header">
                            <i class="bi bi-file-text" style="color:var(--blue);"></i>
                            <span class="card-header-title" th:text="${request.title}">Titel</span>
                        </div>
                        <div class="card-body">
                            <p th:text="${request.description}"
                               style="color:var(--text-muted);white-space:pre-wrap;
                                      line-height:1.65;font-size:14px;margin:0;"></p>
                        </div>
                    </div>

                    <!-- Activity -->
                    <div class="card">
                        <div class="card-header">
                            <i class="bi bi-activity" style="color:var(--blue);"></i>
                            <span class="card-header-title" data-i18n="empDet.activity">Aktivität</span>
                        </div>
                        <div class="card-body" style="padding:0 20px;">
                            <div th:if="${#lists.isEmpty(comments)}" class="empty-state" style="padding:36px 0;">
                                <i class="bi bi-chat-dots"></i>
                                <p data-i18n="empDet.noActivity">Noch keine Aktivität.</p>
                            </div>
                            <div class="activity-list">
                                <div th:each="comment : ${comments}" class="activity-item">
                                    <div class="activity-header">
                                        <div class="d-flex align-center gap-2">
                                            <span class="activity-author" th:text="${comment.author.fullName}">Name</span>
                                            <span class="chip" style="font-size:10.5px;"
                                                  th:text="${comment.author.role.name()}"></span>
                                        </div>
                                        <span class="activity-time"
                                              th:text="${#temporals.format(comment.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
                                    </div>
                                    <p class="activity-text"
                                       th:classappend="${comment.resolutionNote} ? ' resolution'"
                                       th:text="${comment.content}"></p>
                                    <span th:if="${comment.resolutionNote}" class="resolution-tag">
                                        <i class="bi bi-check-circle-fill" style="font-size:11px;"></i>
                                        Lösungshinweis
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right column — details -->
                <div>
                    <div class="card">
                        <div class="card-header">
                            <i class="bi bi-info-circle" style="color:var(--blue);"></i>
                            <span class="card-header-title" data-i18n="empDet.details">Details</span>
                        </div>
                        <div class="card-body" style="padding:4px 20px 8px;">
                            <div class="detail-section">
                                <div class="detail-item">
                                    <div class="detail-label" data-i18n="empDet.category">Kategorie</div>
                                    <div class="detail-value" th:text="${request.category.displayName}"></div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label" data-i18n="empDet.priority">Priorität</div>
                                    <div class="detail-value">
                                        <span th:class="'badge priority-' + ${request.priority.name().toLowerCase()}"
                                              th:text="${request.priority.displayName}"></span>
                                    </div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label" data-i18n="empDet.assignedTo">Zugewiesen an</div>
                                    <div class="detail-value"
                                         th:text="${request.assignedTo?.fullName ?: '—'}"></div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label" data-i18n="empDet.created">Erstellt</div>
                                    <div class="detail-value"
                                         th:text="${#temporals.format(request.createdAt, 'dd.MM.yyyy HH:mm')}"></div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label" data-i18n="empDet.modified">Zuletzt geändert</div>
                                    <div class="detail-value"
                                         th:text="${#temporals.format(request.updatedAt, 'dd.MM.yyyy HH:mm')}"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="srm-overlay" id="sidebarOverlay"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
