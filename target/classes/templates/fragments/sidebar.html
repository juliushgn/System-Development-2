<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<aside th:fragment="sidebar(activePage)" class="srm-sidebar" id="sidebar">
    <a class="srm-brand" th:href="@{/}">
        <div class="srm-brand-mark"><i class="bi bi-ticket-detailed"></i></div>
        <span class="srm-brand-name">SRM <em>System</em></span>
    </a>

    <nav class="srm-nav">
        <span class="srm-nav-label" data-i18n="nav.label">Navigation</span>

        <!-- Employee nav -->
        <th:block th:if="${currentUser.role.name() == 'EMPLOYEE'}">
            <a class="srm-nav-item" th:classappend="${activePage == 'myRequests'} ? 'active'"
               th:href="@{/employee/requests}">
                <i class="bi bi-list-ul"></i>
                <span data-i18n="nav.myRequests">Meine Anfragen</span>
            </a>
            <a class="srm-nav-item" th:classappend="${activePage == 'newRequest'} ? 'active'"
               th:href="@{/employee/requests/new}">
                <i class="bi bi-plus-circle"></i>
                <span data-i18n="nav.newRequest">Neue Anfrage</span>
            </a>
        </th:block>

        <!-- Manager nav -->
        <th:block th:if="${currentUser.role.name() == 'MANAGER'}">
            <a class="srm-nav-item" th:classappend="${activePage == 'dashboard'} ? 'active'"
               th:href="@{/manager/dashboard}">
                <i class="bi bi-bar-chart-line"></i>
                <span data-i18n="nav.dashboard">Dashboard</span>
            </a>
            <a class="srm-nav-item" th:classappend="${activePage == 'allRequests'} ? 'active'"
               th:href="@{/manager/requests}">
                <i class="bi bi-table"></i>
                <span data-i18n="nav.allRequests">Alle Anfragen</span>
            </a>
        </th:block>

        <!-- Agent / Manager: queue -->
        <th:block th:unless="${currentUser.role.name() == 'EMPLOYEE'}">
            <a class="srm-nav-item" th:classappend="${activePage == 'queue'} ? 'active'"
               th:href="@{/agent/requests}">
                <i class="bi bi-inbox"></i>
                <span data-i18n="nav.queue">Anfragen-Queue</span>
            </a>
        </th:block>
    </nav>

    <div class="srm-sidebar-footer">
        <div class="srm-sidebar-prefs">
            <button type="button" class="srm-pref-btn srm-theme-btn" title="Dunkelmodus">
                <i class="bi bi-moon-stars"></i><span class="pref-label">Dunkelmodus</span>
            </button>
            <button type="button" class="srm-pref-btn srm-lang-btn" title="English">
                <i class="bi bi-translate"></i><span class="pref-label">English</span>
            </button>
        </div>
        <div class="srm-user-row">
            <div class="srm-avatar"
                 th:text="${#strings.substring(currentUser.firstName,0,1) + #strings.substring(currentUser.lastName,0,1)}">XX</div>
            <div>
                <div class="srm-user-info-name" th:text="${currentUser.fullName}">User Name</div>
                <div class="srm-user-info-role"
                     th:attr="data-i18n=${currentUser.role.name() == 'SERVICE_AGENT' ? 'role.agent' : ('role.' + currentUser.role.name().toLowerCase())}">Role</div>
            </div>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="srm-logout-btn">
                <i class="bi bi-box-arrow-right"></i>
                <span data-i18n="nav.logout">Abmelden</span>
            </button>
        </form>
    </div>
</aside>

</body>
</html>
