<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmelden · SRM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">

<div class="login-wrap">

    <!-- Logo -->
    <div class="login-logo">
        <div class="login-logo-mark">
            <i class="bi bi-ticket-detailed"></i>
        </div>
        <div class="login-logo-name">SRM System</div>
        <div class="login-logo-sub">Enterprise Service Request Management</div>
    </div>

    <!-- Card -->
    <div class="card">
        <div class="card-body" style="padding:28px;">
            <h1 style="font-size:18px;font-weight:700;color:var(--text);letter-spacing:-0.02em;margin-bottom:4px;">
                Anmelden
            </h1>
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:24px;">
                Geben Sie Ihre Zugangsdaten ein
            </p>

            <div th:if="${param.error}" class="alert alert-danger">
                <i class="bi bi-exclamation-circle"></i>
                <span class="alert-text">Ungültige E-Mail-Adresse oder Passwort.</span>
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                <i class="bi bi-check-circle"></i>
                <span class="alert-text">Sie wurden erfolgreich abgemeldet.</span>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username" class="form-label">E-Mail-Adresse</label>
                    <input type="email" id="username" name="username"
                           class="form-control"
                           placeholder="name@unternehmen.com"
                           required autofocus>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Passwort</label>
                    <input type="password" id="password" name="password"
                           class="form-control"
                           placeholder="••••••••"
                           required>
                </div>

                <button type="submit" class="btn btn-primary w-full" style="height:42px;font-size:14px;margin-top:4px;">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Anmelden
                </button>
            </form>
        </div>
    </div>

    <!-- Demo credentials -->
    <div class="card" style="margin-top:12px;">
        <div class="card-body" style="padding:16px 20px;">
            <p style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:10px;">
                Demo-Zugänge
                <span style="font-weight:400;color:var(--text-dim);">— Klicken zum Ausfüllen</span>
            </p>
            <div style="display:flex;flex-direction:column;gap:4px;">
                <button type="button" class="demo-account-btn" onclick="fillDemo('alice@company.com')">
                    <span class="chip">Mitarbeiter</span>
                    <span class="demo-email">alice@company.com</span>
                    <i class="bi bi-arrow-right-circle demo-arrow"></i>
                </button>
                <button type="button" class="demo-account-btn" onclick="fillDemo('carol@company.com')">
                    <span class="chip">Service Agent</span>
                    <span class="demo-email">carol@company.com</span>
                    <i class="bi bi-arrow-right-circle demo-arrow"></i>
                </button>
                <button type="button" class="demo-account-btn" onclick="fillDemo('eve@company.com')">
                    <span class="chip" style="background:var(--blue-tonal);color:var(--blue);border-color:transparent;">Manager</span>
                    <span class="demo-email">eve@company.com</span>
                    <i class="bi bi-arrow-right-circle demo-arrow"></i>
                </button>
            </div>
        </div>
    </div>

</div>

<script th:src="@{/js/main.js}"></script>
<script>
function fillDemo(email) {
    document.getElementById('username').value = email;
    document.getElementById('password').value = 'password123';
    document.getElementById('username').focus();
}
</script>
<style>
.demo-account-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 8px 10px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--r-sm);
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    transition: background var(--dur), border-color var(--dur);
}
.demo-account-btn:hover {
    background: var(--hover-neutral);
    border-color: var(--border);
}
.demo-account-btn:hover .demo-arrow {
    opacity: 1;
}
.demo-email {
    font-size: 13px;
    color: var(--text-muted);
    flex: 1;
}
.demo-arrow {
    font-size: 15px;
    color: var(--blue);
    opacity: 0;
    transition: opacity var(--dur);
}
</style>
</body>
</html>
